# =============================================================================
# deploy-production.yml
# -----------------------------------------------------------------------------
# Production deployment. REQUIRES an existing change request issue that has
# been approved via the webapp (labels: change-request + status:approved +
# env:production). The workflow fails fast if the supplied change_request_id
# is missing, invalid, unapproved, or for the wrong environment. After
# smoke-tests succeed, the CR is marked deployed.
# =============================================================================

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Application being onboarded"
        required: true
        default: "demo-app"
      change_request_id:
        description: "Existing approved CR issue number (REQUIRED)"
        required: true
      change_title:
        description: "Change title (for this deployment run; also shown in the CR's deployed comment)"
        required: true
      change_description:
        description: "Change description"
        required: true
      inject_failure:
        description: "Force a stage to fail on attempt 1 (for the Re-run demo)"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - terraform-provision
          - ansible-configure
          - splunk-integrate

permissions:
  contents: read
  issues: write

jobs:

  validate-request:
    name: Validate request payload
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "App:         ${{ inputs.app_name }}"
          echo "Environment: production"
          echo "CR ID:       ${{ inputs.change_request_id }}"
          echo "Title:       ${{ inputs.change_title }}"
      - name: Verify required inputs
        run: |
          [ -z "${{ inputs.change_title }}" ]       && { echo "ERROR: change_title is required"; exit 1; } || true
          [ -z "${{ inputs.change_description }}" ] && { echo "ERROR: change_description is required"; exit 1; } || true
          [ -z "${{ inputs.change_request_id }}" ]  && { echo "ERROR: change_request_id is required for production"; exit 1; } || true
          echo "OK"

  verify-cr:
    name: Verify change record is approved
    needs: validate-request
    runs-on: ubuntu-latest
    outputs:
      cr_id: ${{ steps.verify.outputs.cr_id }}
      cr_url: ${{ steps.verify.outputs.cr_url }}
    steps:
      - id: verify
        uses: actions/github-script@v9
        env:
          CHANGE_REQUEST_ID: ${{ inputs.change_request_id }}
        with:
          script: |
            const num = parseInt(process.env.CHANGE_REQUEST_ID, 10);
            if (Number.isNaN(num)) {
              core.setFailed(`change_request_id is not a number`);
              return;
            }
            let issue;
            try {
              const res = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
              });
              issue = res.data;
            } catch (e) {
              core.setFailed(`CR #${num} not found: ${e.message}`);
              return;
            }
            const labels = issue.labels.map(l => l.name);
            const checks = [
              ['change-request', 'not a change request issue'],
              ['status:approved', 'not approved (use the webapp to approve first)'],
              ['env:production', 'not for production'],
            ];
            const failures = checks.filter(([l, _]) => !labels.includes(l));
            if (failures.length) {
              core.setFailed(
                `CR #${num} failed gate: ${failures.map(([, m]) => m).join('; ')}. ` +
                `Current labels: ${labels.join(', ') || '(none)'}.`
              );
              return;
            }
            core.setOutput('cr_id', num);
            core.setOutput('cr_url', issue.html_url);
            await core.summary
              .addHeading('Production change request verified', 3)
              .addLink(`#${num}: ${issue.title}`, issue.html_url)
              .write();

  terraform-provision:
    name: Terraform provision
    needs: verify-cr
    runs-on: ubuntu-latest
    steps:
      - name: Inject failure (demo only — first attempt only)
        if: inputs.inject_failure == 'terraform-provision' && github.run_attempt == 1
        run: |
          echo "INJECTED FAILURE on attempt 1. Click 'Re-run failed jobs' — attempt 2 will skip and succeed."
          exit 1
      - run: echo "terraform init"
      - run: echo "terraform plan -out=tfplan"
      - run: echo "terraform apply tfplan"
      - run: 'echo "outputs: instance_id=i-abc123 vpc_id=vpc-def456"'

  ansible-configure:
    name: Ansible configure
    needs: terraform-provision
    runs-on: ubuntu-latest
    steps:
      - name: Inject failure (demo only — first attempt only)
        if: inputs.inject_failure == 'ansible-configure' && github.run_attempt == 1
        run: |
          echo "INJECTED FAILURE on attempt 1."
          exit 1
      - run: echo "ansible-playbook -i inventory site.yml"
      - run: 'echo "configured: baseline + hardening + agents installed"'

  splunk-integrate:
    name: Splunk forwarder
    needs: ansible-configure
    runs-on: ubuntu-latest
    steps:
      - name: Inject failure (demo only — first attempt only)
        if: inputs.inject_failure == 'splunk-integrate' && github.run_attempt == 1
        run: |
          echo "INJECTED FAILURE on attempt 1."
          exit 1
      - run: echo "configured Splunk Universal Forwarder -> indexer cluster"
      - run: echo "verified events arriving in index=app_${{ inputs.app_name }}"

  dynatrace-integrate:
    name: Dynatrace OneAgent
    needs: ansible-configure
    runs-on: ubuntu-latest
    steps:
      - run: echo "OneAgent installed and registered"
      - run: 'echo "host group: production-${{ inputs.app_name }}"'

  cmdb-register:
    name: CMDB / ITSM registration
    needs: ansible-configure
    runs-on: ubuntu-latest
    steps:
      - run: echo "POST /cmdb/ci -- registered new CI"

  smoke-tests:
    name: Smoke tests
    needs: [splunk-integrate, dynatrace-integrate, cmdb-register]
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "health check: app responds on /healthz"'
      - run: 'echo "log check:    Splunk shows app startup events"'
      - run: 'echo "trace check:  Dynatrace shows service registered"'

  mark-deployed:
    name: Mark change record as deployed
    needs: [smoke-tests, verify-cr]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        env:
          CR_ID: ${{ needs.verify-cr.outputs.cr_id }}
          CHANGE_TITLE: ${{ inputs.change_title }}
        with:
          script: |
            const num = parseInt(process.env.CR_ID, 10);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
            });
            const newLabels = issue.labels
              .map(l => l.name)
              .filter(n => !n.startsWith('status:'))
              .concat('status:deployed');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              labels: newLabels,
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              body: [
                `:rocket: **Deployed:** ${process.env.CHANGE_TITLE}`,
                ``,
                `Via [run #${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              ].join('\n'),
            });

  notify:
    name: Notify
    needs: mark-deployed
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "slack: #onboarding -- ${{ inputs.app_name }} live in production: ${{ inputs.change_title }}"'
      - run: 'echo "ServiceNow: CRQ closed as Implemented - Successful"'
