# =============================================================================
# deploy-pages.yml
# -----------------------------------------------------------------------------
# Custom GitHub Pages deploy workflow. Replaces the default
# "pages-build-deployment" job (created automatically when Pages is configured
# in "Deploy from a branch" mode) with a workflow we control -- and that
# carries a human-readable name in the Actions tab.
#
# REQUIRES: Pages must be configured in "GitHub Actions" source mode (not
# "Deploy from a branch"). Flip via:
#   gh api -X PUT repos/{owner}/{repo}/pages -F 'build_type=workflow'
# or in repo Settings -> Pages -> Source -> "GitHub Actions".
# =============================================================================

name: Deploy Change Management App

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; queue new ones rather than canceling.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build + deploy docs/ to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
