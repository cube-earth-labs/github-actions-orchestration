# =============================================================================
# orchestration-primitives.yml
# -----------------------------------------------------------------------------
# Pattern reference. Each job demonstrates one orchestration primitive in
# isolation so the graph view is easy to read.
#
# Primitives demonstrated:
#   - Sequential chain    (job-a -> job-b -> job-c via `needs:`)
#   - Parallel branches   (two jobs with no `needs:` between them)
#   - Fan-out via matrix  (`strategy.matrix:`)
#   - Fan-in              (downstream `needs: [a, b, c]`)
#   - Per-step retry      (`continue-on-error` + retry-on-failure pattern)
#   - Conditional run     (`if:` expressions)
# =============================================================================

name: Orchestration Primitives (Demo)

on:
  workflow_dispatch:
    inputs:
      force_fail_retry_demo:
        description: "Force the retry-demo job to fail on first attempt"
        required: false
        default: "false"

jobs:

  # ---------------------------------------------------------------------------
  # 1. SEQUENTIAL CHAIN: serial-a -> serial-b -> serial-c
  # ---------------------------------------------------------------------------
  serial-a:
    name: "Serial: step A"
    runs-on: ubuntu-latest
    steps:
      - run: echo "A done"

  serial-b:
    name: "Serial: step B"
    needs: serial-a
    runs-on: ubuntu-latest
    steps:
      - run: echo "B done (after A)"

  serial-c:
    name: "Serial: step C"
    needs: serial-b
    runs-on: ubuntu-latest
    steps:
      - run: echo "C done (after B)"

  # ---------------------------------------------------------------------------
  # 2. PARALLEL BRANCHES: parallel-x and parallel-y both start immediately
  #    and run side-by-side. No `needs:` between them.
  # ---------------------------------------------------------------------------
  parallel-x:
    name: "Parallel: branch X"
    runs-on: ubuntu-latest
    steps:
      - run: echo "X running (in parallel with Y)"
      - run: sleep 2 && echo "X done"

  parallel-y:
    name: "Parallel: branch Y"
    runs-on: ubuntu-latest
    steps:
      - run: echo "Y running (in parallel with X)"
      - run: sleep 2 && echo "Y done"

  # ---------------------------------------------------------------------------
  # 3. FAN-OUT VIA MATRIX: one job definition, three parallel instances.
  # ---------------------------------------------------------------------------
  fanout-matrix:
    name: "Fan-out: region ${{ matrix.region }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region: [us-east-1, us-west-2, eu-west-1]
    steps:
      - run: echo "applying config to ${{ matrix.region }}"

  # ---------------------------------------------------------------------------
  # 4. FAN-IN: waits for ALL upstream jobs to complete before running.
  # ---------------------------------------------------------------------------
  fanin-aggregate:
    name: "Fan-in: aggregate results"
    needs: [parallel-x, parallel-y, fanout-matrix]
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "X status:      ${{ needs.parallel-x.result }}"'
      - run: 'echo "Y status:      ${{ needs.parallel-y.result }}"'
      - run: 'echo "Matrix status: ${{ needs.fanout-matrix.result }}"'
      - run: echo "All parallel branches complete -- aggregating."

  # ---------------------------------------------------------------------------
  # 5. RETRY: a step that may fail. Two ways to handle this in GHA:
  #    (a) `continue-on-error: true` lets the workflow proceed even if this
  #        step fails (good for non-critical telemetry posts).
  #    (b) For critical work, leave it as a hard failure -- the "Re-run failed
  #        jobs" button in the UI re-runs just this job, preserving outputs
  #        from successful upstream jobs. (This is the customer's question #1.)
  # ---------------------------------------------------------------------------
  retry-demo:
    name: "Retry pattern"
    runs-on: ubuntu-latest
    steps:
      - name: Flaky step (continue-on-error)
        continue-on-error: true
        run: |
          if [ "${{ inputs.force_fail_retry_demo }}" = "true" ]; then
            echo "simulating failure"; exit 1
          fi
          echo "flaky step succeeded"

      - name: Retry-on-failure (loop with backoff)
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "attempt $attempt"
            # real call here; for the demo just succeed on attempt 1
            break
          done

  # ---------------------------------------------------------------------------
  # 6. CONDITIONAL RUN: this job only runs on the main branch and only if
  #    all upstream jobs succeeded.
  # ---------------------------------------------------------------------------
  conditional-deploy:
    name: "Conditional: deploy"
    needs: fanin-aggregate
    if: github.ref == 'refs/heads/main' && needs.fanin-aggregate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - run: echo "deploying because branch=main and upstream succeeded"
