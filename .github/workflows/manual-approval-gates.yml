# =============================================================================
# manual-approval-gates.yml
# -----------------------------------------------------------------------------
# CRQ-style change-approval gates using GitHub Actions ENVIRONMENTS.
#
# How it works:
#   - In GitHub repo settings, create environments named `staging-approval`
#     and `production-approval`.
#   - On each environment, set "Required reviewers" to the change-approval
#     team (e.g., the CAB members).
#   - When a job specifies `environment: <name>`, the workflow PAUSES on that
#     job until a required reviewer clicks Approve (or Reject) in the UI.
#
# This is the natural ServiceNow-CRQ analog inside GitHub Actions. No
# extra plugin, no extra service.
# =============================================================================

name: Manual Approval Gates (Demo)

on:
  workflow_dispatch:

jobs:

  build:
    name: Build artifact
    runs-on: ubuntu-latest
    steps:
      - run: echo "built artifact app-1.2.3.tar.gz"

  # ---------------------------------------------------------------------------
  # First gate: deploy to staging only after a reviewer approves.
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to staging (gated)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging-approval
      url: https://staging.example.com
    steps:
      - run: echo "deploying app-1.2.3.tar.gz to staging"
      - run: echo "staging smoke tests passed"

  # ---------------------------------------------------------------------------
  # Second gate: production deploy requires a SEPARATE approval, typically
  # from a different group (CAB / change-management).
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to production (CRQ-gated)
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production-approval
      url: https://app.example.com
    steps:
      - run: echo "deploying app-1.2.3.tar.gz to production"
      - run: echo "production smoke tests passed"

  # ---------------------------------------------------------------------------
  # Post-deploy notification. Runs regardless of approval outcome of prior
  # jobs, demonstrating `if: always()`.
  # ---------------------------------------------------------------------------
  notify:
    name: Notify outcome
    needs: [deploy-staging, deploy-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "staging:    ${{ needs.deploy-staging.result }}"
          echo "production: ${{ needs.deploy-production.result }}"
          echo "posted to #change-management"
