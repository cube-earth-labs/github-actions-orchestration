# =============================================================================
# saas-onboarding.yml
# -----------------------------------------------------------------------------
# Flagship demo. Mirrors Acme Corporation's actual SaaS-onboarding flow:
#
#   validate -> CRQ approval -> terraform provision -> ansible configure
#            -> (splunk || dynatrace || cmdb) -> smoke tests -> notify
#
# Every step is a simple `echo` so the run executes in seconds. The graph view
# in the Actions UI is the artifact -- it answers all three of the customer's
# questions visually:
#   1. Re-trigger failed jobs?     Yes -- "Re-run failed jobs" in the UI.
#   2. See order visually?         Yes -- the job DAG is rendered.
#   3. Chain serial + parallel?    Yes -- `needs:` chains, no-needs = parallel.
# =============================================================================

name: SaaS Onboarding (Demo)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Name of the application being onboarded"
        required: true
        default: "demo-app"
      environment:
        description: "Target environment"
        required: true
        default: "sandbox"
        type: choice
        options:
          - sandbox
          - staging
          - production

jobs:

  # ---------------------------------------------------------------------------
  # STAGE 1 -- Validate the incoming request. Cheap, fail-fast.
  # ---------------------------------------------------------------------------
  validate-request:
    name: Validate request payload
    runs-on: ubuntu-latest
    steps:
      - name: Echo request
        run: |
          echo "App:         ${{ inputs.app_name }}"
          echo "Environment: ${{ inputs.environment }}"
      - name: Verify naming convention
        run: 'echo "OK: app name matches /^[a-z][a-z0-9-]{2,30}$/"'
      - name: Verify quota available
        run: 'echo "OK: requesting team has quota in ${{ inputs.environment }}"'

  # ---------------------------------------------------------------------------
  # STAGE 2 -- CRQ approval gate.
  #
  # Uses a GitHub "environment" with required reviewers. The workflow pauses
  # here until an approver clicks Approve in the Actions UI. This is the
  # ServiceNow-CRQ-equivalent in GitHub Actions.
  # ---------------------------------------------------------------------------
  crq-approval:
    name: CRQ approval
    needs: validate-request
    runs-on: ubuntu-latest
    environment: change-approval   # <-- configure required reviewers here
    steps:
      - run: echo "CRQ approved. Proceeding with onboarding."

  # ---------------------------------------------------------------------------
  # STAGE 3 -- Terraform provisioning. Runs after CRQ.
  # In a real workflow this would call `terraform plan` and `terraform apply`
  # against TFC/TFE or trigger a run via the TFE API.
  # ---------------------------------------------------------------------------
  terraform-provision:
    name: Terraform provision
    needs: crq-approval
    runs-on: ubuntu-latest
    steps:
      - run: echo "terraform init"
      - run: echo "terraform plan -out=tfplan"
      - run: echo "terraform apply tfplan"
      - run: 'echo "outputs: instance_id=i-abc123 vpc_id=vpc-def456"'

  # ---------------------------------------------------------------------------
  # STAGE 4 -- Ansible host configuration. Runs after provisioning.
  # In a real workflow this would invoke AAP via API or run ansible-playbook
  # against the new hosts.
  # ---------------------------------------------------------------------------
  ansible-configure:
    name: Ansible configure
    needs: terraform-provision
    runs-on: ubuntu-latest
    steps:
      - run: echo "ansible-playbook -i inventory site.yml"
      - run: 'echo "configured: baseline + hardening + agents installed"'

  # ---------------------------------------------------------------------------
  # STAGE 5 -- Observability + ITSM integrations. ALL THREE RUN IN PARALLEL.
  # Each depends on ansible-configure but NOT on each other.
  # ---------------------------------------------------------------------------
  splunk-integrate:
    name: Splunk forwarder
    needs: ansible-configure
    runs-on: ubuntu-latest
    steps:
      - run: echo "configured Splunk Universal Forwarder -> indexer cluster"
      - run: echo "verified events arriving in index=app_${{ inputs.app_name }}"

  dynatrace-integrate:
    name: Dynatrace OneAgent
    needs: ansible-configure
    runs-on: ubuntu-latest
    steps:
      - run: echo "OneAgent installed and registered"
      - run: 'echo "host group: ${{ inputs.environment }}-${{ inputs.app_name }}"'

  cmdb-register:
    name: CMDB / ITSM registration
    needs: ansible-configure
    runs-on: ubuntu-latest
    steps:
      - run: echo "POST /cmdb/ci -- registered new CI"
      - run: echo "linked CI to CRQ from stage 2"

  # ---------------------------------------------------------------------------
  # STAGE 6 -- Smoke tests. FAN IN: blocks until all three integrations done.
  # ---------------------------------------------------------------------------
  smoke-tests:
    name: Smoke tests
    needs: [splunk-integrate, dynatrace-integrate, cmdb-register]
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "health check: app responds on /healthz"'
      - run: 'echo "log check:    Splunk shows app startup events"'
      - run: 'echo "trace check:  Dynatrace shows service registered"'

  # ---------------------------------------------------------------------------
  # STAGE 7 -- Notify + close CRQ. Always runs last.
  # ---------------------------------------------------------------------------
  notify:
    name: Notify + close CRQ
    needs: smoke-tests
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "slack: #onboarding -- ${{ inputs.app_name }} live in ${{ inputs.environment }}"'
      - run: 'echo "ServiceNow: CRQ closed as Implemented - Successful"'
