# =============================================================================
# saas-onboarding.yml
# -----------------------------------------------------------------------------
# Flagship demo. Mirrors Acme Corporation's actual SaaS-onboarding flow:
#
#   validate -> change-management gate -> terraform provision -> ansible configure
#            -> (splunk || dynatrace || cmdb) -> smoke tests -> mark deployed
#            -> notify
#
# The change-management gate behaves differently per environment:
#   sandbox     One human reviewer in the GitHub Actions UI (environment gate).
#               NO change request record is created.
#   staging     A change request issue is auto-created in the repo (with the
#               webapp at docs/index.html as the friendly UI on top). Allowed
#               any time; the CR is for audit/record only.
#   production  An EXISTING approved change request is required. The workflow
#               fetches the issue, verifies it has labels `change-request`,
#               `status:approved`, and `env:production`, and fails fast
#               otherwise. Approval is performed in the webapp.
#
# After smoke-tests succeed, the CR (if any) is re-labeled `status:deployed`
# and a comment is added linking back to the workflow run.
#
# Failure injection (for the Re-run demo):
#   The `inject_failure` input forces a chosen stage to exit non-zero ON
#   THE FIRST ATTEMPT ONLY (`github.run_attempt == 1`). On any re-run,
#   `run_attempt` is >= 2, the injection step is skipped, and the workflow
#   proceeds to success.
#
#   Best demo:
#     1. Run with inject_failure=splunk-integrate
#        -> splunk fails, dynatrace + cmdb stay green, smoke-tests is skipped
#     2. Click "Re-run failed jobs"
#        -> attempt 2: injection skipped, splunk succeeds, downstream runs
#        -> upstream successful jobs (terraform, ansible, dynatrace, cmdb)
#           are NOT re-run -- their original outcome is preserved
#
# Every "real" step is a simple `echo` so the run executes in seconds. The
# graph view in the Actions UI is the artifact.
# =============================================================================

name: SaaS Onboarding (Demo)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "sandbox"
        type: choice
        options:
          - sandbox
          - staging
          - production
      app_name:
        description: "Application being onboarded"
        required: true
        default: "demo-app"
      change_title:
        description: "Change title (required for every environment)"
        required: true
      change_description:
        description: "Change description (required for every environment)"
        required: true
      change_request_id:
        description: "[production only] Existing approved CR issue number (REQUIRED for production)"
        required: false
        default: ""
      inject_failure:
        description: "Force a stage to fail on attempt 1 (for the Re-run demo)"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - terraform-provision
          - ansible-configure
          - splunk-integrate

permissions:
  contents: read
  issues: write

jobs:

  # ---------------------------------------------------------------------------
  # STAGE 1 -- Validate the incoming request. Cheap, fail-fast.
  # ---------------------------------------------------------------------------
  validate-request:
    name: Validate request payload
    runs-on: ubuntu-latest
    steps:
      - name: Echo request
        run: |
          echo "App:         ${{ inputs.app_name }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Title:       ${{ inputs.change_title }}"
      - name: Verify required inputs
        run: |
          fail() { echo "ERROR: $1"; exit 1; }
          [ -z "${{ inputs.change_title }}" ]       && fail "change_title is required"
          [ -z "${{ inputs.change_description }}" ] && fail "change_description is required"
          if [ "${{ inputs.environment }}" = "production" ] && [ -z "${{ inputs.change_request_id }}" ]; then
            fail "production deploys REQUIRE change_request_id (the # of an approved CR)"
          fi
          echo "OK: all required inputs provided"
      - name: Verify naming convention
        run: 'echo "OK: app name matches /^[a-z][a-z0-9-]{2,30}$/"'
      - name: Verify quota available
        run: 'echo "OK: requesting team has quota in ${{ inputs.environment }}"'

  # ---------------------------------------------------------------------------
  # STAGE 2a -- SANDBOX: GitHub Actions environment gate (1 human reviewer).
  # No change request is created. Existing behavior.
  # ---------------------------------------------------------------------------
  sandbox-approval:
    name: Sandbox approval (human reviewer)
    if: inputs.environment == 'sandbox'
    needs: validate-request
    runs-on: ubuntu-latest
    environment: change-approval
    steps:
      - run: echo "Sandbox change approved by reviewer. Proceeding."

  # ---------------------------------------------------------------------------
  # STAGE 2b -- STAGING: auto-create a change request issue (status:approved,
  # since staging is allowed any time -- the CR is for audit/record).
  # ---------------------------------------------------------------------------
  staging-create-cr:
    name: Staging — create change record
    if: inputs.environment == 'staging'
    needs: validate-request
    runs-on: ubuntu-latest
    outputs:
      cr_id: ${{ steps.create.outputs.cr_id }}
      cr_url: ${{ steps.create.outputs.cr_url }}
    steps:
      - id: create
        name: Create change request issue
        uses: actions/github-script@v7
        env:
          CHANGE_TITLE: ${{ inputs.change_title }}
          APP_NAME: ${{ inputs.app_name }}
          DESCRIPTION: ${{ inputs.change_description }}
        with:
          script: |
            const body = [
              `**Environment:** staging`,
              `**App:** ${process.env.APP_NAME}`,
              ``,
              `**Description:**`,
              process.env.DESCRIPTION,
              ``,
              `---`,
              `_Auto-created by [run #${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`,
            ].join('\n');
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CR: ${process.env.CHANGE_TITLE}`,
              body,
              labels: ['change-request', 'status:approved', 'env:staging'],
            });
            core.setOutput('cr_id', issue.number);
            core.setOutput('cr_url', issue.html_url);
            await core.summary
              .addHeading('Change request created', 3)
              .addLink(`#${issue.number}: ${issue.title}`, issue.html_url)
              .write();

  # ---------------------------------------------------------------------------
  # STAGE 2c -- PRODUCTION: verify an existing change request is approved.
  # ---------------------------------------------------------------------------
  production-verify-cr:
    name: Production — verify change record
    if: inputs.environment == 'production'
    needs: validate-request
    runs-on: ubuntu-latest
    outputs:
      cr_id: ${{ steps.verify.outputs.cr_id }}
      cr_url: ${{ steps.verify.outputs.cr_url }}
    steps:
      - id: verify
        name: Fetch and verify change request
        uses: actions/github-script@v7
        env:
          CHANGE_REQUEST_ID: ${{ inputs.change_request_id }}
        with:
          script: |
            const num = parseInt(process.env.CHANGE_REQUEST_ID, 10);
            if (Number.isNaN(num)) {
              core.setFailed(`change_request_id is not a number`);
              return;
            }
            let issue;
            try {
              const res = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
              });
              issue = res.data;
            } catch (e) {
              core.setFailed(`CR #${num} not found: ${e.message}`);
              return;
            }
            const labels = issue.labels.map(l => l.name);
            const checks = [
              ['change-request', 'not a change request issue'],
              ['status:approved', 'not approved (use the webapp to approve first)'],
              ['env:production', 'not for production'],
            ];
            const failures = checks.filter(([l, _]) => !labels.includes(l));
            if (failures.length) {
              core.setFailed(
                `CR #${num} failed gate: ${failures.map(([, m]) => m).join('; ')}. ` +
                `Current labels: ${labels.join(', ') || '(none)'}.`
              );
              return;
            }
            core.setOutput('cr_id', num);
            core.setOutput('cr_url', issue.html_url);
            await core.summary
              .addHeading('Production change request verified', 3)
              .addLink(`#${num}: ${issue.title}`, issue.html_url)
              .write();

  # ---------------------------------------------------------------------------
  # STAGE 3 -- Terraform provisioning. Runs after WHICHEVER gate fired.
  # ---------------------------------------------------------------------------
  terraform-provision:
    name: Terraform provision
    needs: [sandbox-approval, staging-create-cr, production-verify-cr]
    if: |
      !failure() && !cancelled() && (
        needs.sandbox-approval.result == 'success' ||
        needs.staging-create-cr.result == 'success' ||
        needs.production-verify-cr.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Inject failure (demo only — first attempt only)
        if: inputs.inject_failure == 'terraform-provision' && github.run_attempt == 1
        run: |
          echo "INJECTED FAILURE on attempt 1. Click 'Re-run failed jobs' — attempt 2 will skip this step and succeed."
          exit 1
      - run: echo "terraform init"
      - run: echo "terraform plan -out=tfplan"
      - run: echo "terraform apply tfplan"
      - run: 'echo "outputs: instance_id=i-abc123 vpc_id=vpc-def456"'

  # ---------------------------------------------------------------------------
  # STAGE 4 -- Ansible host configuration.
  # ---------------------------------------------------------------------------
  ansible-configure:
    name: Ansible configure
    needs: terraform-provision
    # IMPORTANT: GHA auto-skips any job whose `needs:` chain contains a
    # transitively-skipped ancestor (the two unused per-env gates in this
    # workflow), and this auto-skip happens BEFORE the if: clause is even
    # evaluated -- unless the if: uses a status-check function
    # (always(), !cancelled(), success(), failure()). A plain boolean like
    # `needs.X.result == 'success'` is NOT enough on its own. The
    # `!cancelled() &&` prefix forces the if: to evaluate, then we check
    # the direct dependency.
    if: ${{ !cancelled() && needs.terraform-provision.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Inject failure (demo only — first attempt only)
        if: inputs.inject_failure == 'ansible-configure' && github.run_attempt == 1
        run: |
          echo "INJECTED FAILURE on attempt 1. Click 'Re-run failed jobs' — attempt 2 will skip this step and succeed."
          exit 1
      - run: echo "ansible-playbook -i inventory site.yml"
      - run: 'echo "configured: baseline + hardening + agents installed"'

  # ---------------------------------------------------------------------------
  # STAGE 5 -- Observability + ITSM integrations. ALL THREE RUN IN PARALLEL.
  # ---------------------------------------------------------------------------
  splunk-integrate:
    name: Splunk forwarder
    needs: ansible-configure
    if: ${{ !cancelled() && needs.ansible-configure.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Inject failure (demo only — first attempt only)
        if: inputs.inject_failure == 'splunk-integrate' && github.run_attempt == 1
        run: |
          echo "INJECTED FAILURE on attempt 1. Click 'Re-run failed jobs' — attempt 2 will skip this step and succeed."
          exit 1
      - run: echo "configured Splunk Universal Forwarder -> indexer cluster"
      - run: echo "verified events arriving in index=app_${{ inputs.app_name }}"

  dynatrace-integrate:
    name: Dynatrace OneAgent
    needs: ansible-configure
    if: ${{ !cancelled() && needs.ansible-configure.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "OneAgent installed and registered"
      - run: 'echo "host group: ${{ inputs.environment }}-${{ inputs.app_name }}"'

  cmdb-register:
    name: CMDB / ITSM registration
    needs: ansible-configure
    if: ${{ !cancelled() && needs.ansible-configure.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "POST /cmdb/ci -- registered new CI"
      - run: echo "linked CI to CRQ from stage 2"

  # ---------------------------------------------------------------------------
  # STAGE 6 -- Smoke tests. FAN IN: blocks until all three integrations done.
  # ---------------------------------------------------------------------------
  smoke-tests:
    name: Smoke tests
    needs: [splunk-integrate, dynatrace-integrate, cmdb-register]
    if: |
      !cancelled() &&
      needs.splunk-integrate.result == 'success' &&
      needs.dynatrace-integrate.result == 'success' &&
      needs.cmdb-register.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "health check: app responds on /healthz"'
      - run: 'echo "log check:    Splunk shows app startup events"'
      - run: 'echo "trace check:  Dynatrace shows service registered"'

  # ---------------------------------------------------------------------------
  # STAGE 7 -- Mark the change request as deployed (staging + production only).
  # Skipped for sandbox (no CR to update).
  # ---------------------------------------------------------------------------
  mark-deployed:
    name: Mark change record as deployed
    needs: [smoke-tests, staging-create-cr, production-verify-cr]
    if: |
      !cancelled() &&
      needs.smoke-tests.result == 'success' && (
        needs.staging-create-cr.result == 'success' ||
        needs.production-verify-cr.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          CR_ID: ${{ needs.staging-create-cr.outputs.cr_id || needs.production-verify-cr.outputs.cr_id }}
          CHANGE_TITLE: ${{ inputs.change_title }}
        with:
          script: |
            const num = parseInt(process.env.CR_ID, 10);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
            });
            const newLabels = issue.labels
              .map(l => l.name)
              .filter(n => !n.startsWith('status:'))
              .concat('status:deployed');
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              labels: newLabels,
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              body: [
                `:rocket: **Deployed:** ${process.env.CHANGE_TITLE}`,
                ``,
                `Via [run #${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              ].join('\n'),
            });
            await core.summary
              .addHeading('Change request marked deployed', 3)
              .addLink(`#${num}`, issue.html_url)
              .write();

  # ---------------------------------------------------------------------------
  # STAGE 8 -- Notify. Runs after smoke-tests succeeded, regardless of whether
  # mark-deployed ran (sandbox skips it).
  # ---------------------------------------------------------------------------
  notify:
    name: Notify
    needs: [smoke-tests, mark-deployed]
    if: |
      !cancelled() && needs.smoke-tests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "slack: #onboarding -- ${{ inputs.app_name }} live in ${{ inputs.environment }}: ${{ inputs.change_title }}"'
      - run: 'echo "ServiceNow: CRQ closed as Implemented - Successful"'
